<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>旅行行程 App</title>
  <meta name="theme-color" content="#0f172a">
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #111827;
      --muted: #64748b;
      --line: #dfe4ec;
      --brand: #0f172a;
      --accent: #2563eb;
      --good: #059669;
      --warn: #d97706;
      --shadow: 0 18px 45px rgba(15, 23, 42, .08);
      color-scheme: light;
    }

    [data-theme="dark"] {
      --bg: #0b1020;
      --panel: #111827;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: #273449;
      --brand: #f8fafc;
      --accent: #60a5fa;
      --shadow: 0 18px 45px rgba(0, 0, 0, .35);
      color-scheme: dark;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      line-height: 1.55;
    }

    button, input, select, textarea { font: inherit; color: inherit; }
    a { color: var(--accent); font-weight: 700; }
    .app { max-width: 1180px; margin: 0 auto; padding: 18px 18px 96px; }
    .hero {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: -18px -18px 16px;
      padding: 16px 18px 14px;
      background: color-mix(in srgb, var(--bg) 86%, transparent);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid color-mix(in srgb, var(--line) 55%, transparent);
    }

    .hero-inner { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 800;
      box-shadow: var(--shadow);
      flex: 0 0 auto;
    }

    h1 { font-size: 19px; line-height: 1.2; margin: 0; }
    .subtitle { margin: 2px 0 0; color: var(--muted); font-size: 13px; }
    .actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .btn {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 999px;
      padding: 9px 13px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(15, 23, 42, .05);
    }

    .btn:hover { border-color: #93c5fd; }
    .btn.primary { background: var(--brand); color: var(--bg); border-color: var(--brand); font-weight: 800; }
    .btn.icon { width: 40px; height: 40px; padding: 0; }
    .grid { display: grid; grid-template-columns: 1fr 360px; gap: 16px; align-items: start; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .pad { padding: 16px; }
    .toolbar { display: grid; grid-template-columns: 1fr 150px 150px 120px; gap: 10px; margin-bottom: 12px; }
    .field label { display: block; color: var(--muted); font-size: 12px; margin: 0 0 6px 2px; }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 11px 12px;
      outline: none;
    }

    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(147, 197, 253, .16);
    }

    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
    .stat { border: 1px solid var(--line); border-radius: 8px; padding: 13px; background: color-mix(in srgb, var(--panel) 90%, var(--accent)); }
    .num { font-size: 23px; line-height: 1; font-weight: 800; }
    .label { color: var(--muted); font-size: 12px; margin-top: 5px; }
    .tabs { display: flex; gap: 8px; overflow: auto; margin: 0 0 12px; }
    .tab { white-space: nowrap; border: 1px solid var(--line); background: var(--panel); border-radius: 999px; padding: 8px 12px; cursor: pointer; }
    .tab.active { background: var(--brand); color: var(--bg); border-color: var(--brand); font-weight: 800; }
    .day-group { margin-bottom: 16px; }
    .day-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 9px; }
    .day-title { font-size: 18px; font-weight: 800; }
    .day-meta, .muted { color: var(--muted); font-size: 13px; }
    .cards { display: grid; gap: 10px; }
    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 13px 13px 13px 18px;
    }

    .card::before { content: ""; position: absolute; inset: 0 auto 0 0; width: 5px; background: var(--accent); }
    .card.done { opacity: .62; }
    .card.fav { border-color: #f59e0b; }
    .card-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .time { font-weight: 800; color: var(--accent); font-size: 14px; white-space: nowrap; }
    .title { font-size: 16px; font-weight: 800; line-height: 1.35; }
    .place { color: var(--muted); font-size: 13px; margin-top: 2px; }
    .badges, .card-actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .badge, .mini {
      font-size: 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      background: color-mix(in srgb, var(--panel) 88%, var(--accent));
    }

    .mini { cursor: pointer; color: var(--text); text-decoration: none; }
    .note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      white-space: pre-wrap;
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      padding: 8px 10px;
      background: color-mix(in srgb, var(--panel) 88%, var(--accent));
    }

    .side { position: sticky; top: 88px; display: grid; gap: 14px; }
    .side h2 { font-size: 16px; margin: 0 0 10px; }
    .list { display: grid; gap: 8px; }
    .compact-item { border: 1px solid var(--line); border-radius: 8px; padding: 10px; background: color-mix(in srgb, var(--panel) 93%, var(--accent)); }
    .compact-item b, .compact-item span { display: block; }
    .compact-item span { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .empty { padding: 34px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 8px; }
    .mapbox {
      min-height: 280px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      background: color-mix(in srgb, var(--panel) 88%, var(--accent));
    }

    .route-list { display: grid; gap: 8px; margin-top: 12px; }
    .route-line { display: flex; gap: 10px; align-items: flex-start; border: 1px solid var(--line); border-radius: 8px; padding: 10px; }
    .route-dot { width: 26px; height: 26px; border-radius: 8px; background: var(--accent); color: white; font-weight: 800; display: grid; place-items: center; flex: 0 0 auto; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid var(--line); vertical-align: top; min-width: 120px; }
    th { white-space: nowrap; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(12px);
      z-index: 50;
      background: var(--brand);
      color: var(--bg);
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: .2s;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
      .side { position: static; }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .stats { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      .app { padding-left: 12px; padding-right: 12px; }
      .hero { margin-left: -12px; margin-right: -12px; padding-left: 12px; padding-right: 12px; }
      .toolbar { grid-template-columns: 1fr; }
      .card-top { display: block; }
      .actions .btn:not(.primary):not(.icon) { display: none; }
    }

    @media print {
      .hero, .side, .toolbar, .tabs, .card-actions, .toast { display: none !important; }
      .app { max-width: none; padding: 0; }
      .grid { display: block; }
      .panel { border: 0; box-shadow: none; }
      .card { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="hero-inner">
        <div class="brand">
          <div class="logo">TR</div>
          <div>
            <h1>旅行行程 App</h1>
            <p class="subtitle">匯入 CSV、整理行程、開啟地圖、匯出 ICS 行事曆</p>
          </div>
        </div>
        <div class="actions">
          <button class="btn" id="sampleBtn">範例資料</button>
          <button class="btn" id="exportIcsBtn">匯出 ICS</button>
          <button class="btn" id="printBtn">列印</button>
          <button class="btn icon" id="themeBtn" title="切換深色模式">◐</button>
        </div>
      </div>
    </header>

    <main class="grid">
      <section>
        <div class="panel pad">
          <div class="toolbar">
            <div class="field"><input id="searchInput" placeholder="搜尋行程、地點、備註"></div>
            <div class="field"><select id="dayFilter"><option value="">全部日期</option></select></div>
            <div class="field"><select id="cityFilter"><option value="">全部城市</option></select></div>
            <div class="field">
              <select id="viewFilter">
                <option value="all">全部</option>
                <option value="fav">收藏</option>
                <option value="todo">未完成</option>
                <option value="done">已完成</option>
              </select>
            </div>
          </div>

          <div class="stats" id="stats"></div>
          <div class="tabs">
            <button class="tab active" data-tab="timeline">時間軸</button>
            <button class="tab" data-tab="map">地圖</button>
            <button class="tab" data-tab="checklist">清單</button>
            <button class="tab" data-tab="table">表格</button>
          </div>
          <div id="content"></div>
        </div>
      </section>

      <aside class="side">
        <div class="panel pad">
          <h2>下一段行程</h2>
          <div id="nextBox" class="list"></div>
        </div>
        <div class="panel pad">
          <h2>資料</h2>
          <div class="list">
            <label class="btn" for="csvFileInput">匯入 CSV</label>
            <input id="csvFileInput" type="file" accept=".csv,text/csv" hidden>
            <button class="btn" id="copyPlanBtn">複製目前行程</button>
            <button class="btn" id="downloadCsvBtn">下載 CSV</button>
            <button class="btn" id="clearStateBtn">清除收藏/完成</button>
          </div>
        </div>
        <div class="panel pad">
          <h2>CSV 欄位</h2>
          <div class="muted">支援欄位：日期、開始、結束、標題、地點、城市、地址、交通、分類、費用、備註、連結、地圖。</div>
        </div>
      </aside>
    </main>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const sampleRows = [
      { date: "2026-07-15", start: "07:55", title: "抵達巴黎 CDG 機場", place: "Charles de Gaulle Airport", city: "Paris", transport: "RER B", note: "抵達後前往飯店寄放行李。", map: "Charles de Gaulle Airport" },
      { date: "2026-07-15", start: "14:00", title: "羅浮宮", place: "Louvre Museum", city: "Paris", category: "景點", note: "建議提前預約入場時段。", map: "Louvre Museum Paris" },
      { date: "2026-07-16", start: "09:30", title: "艾菲爾鐵塔", place: "Eiffel Tower", city: "Paris", category: "景點", note: "可順路安排塞納河散步。", map: "Eiffel Tower Paris" },
      { date: "2026-07-17", start: "10:00", title: "前往瑞士", place: "Lauterbrunnen", city: "Switzerland", transport: "Train", note: "確認轉車時間與月台。", map: "Lauterbrunnen Switzerland" }
    ];

    const aliases = {
      date: ["date", "day", "日期", "日", "時間日期"],
      start: ["start", "time", "開始", "開始時間", "時間"],
      end: ["end", "結束", "結束時間"],
      title: ["title", "activity", "plan", "schedule", "標題", "行程", "活動", "事項"],
      place: ["place", "location", "spot", "地點", "位置", "景點"],
      city: ["city", "area", "region", "城市", "地區", "國家"],
      address: ["address", "地址"],
      transport: ["transport", "traffic", "交通", "移動"],
      category: ["category", "type", "分類", "類型"],
      cost: ["cost", "price", "amount", "費用", "價格", "金額"],
      note: ["note", "memo", "description", "remark", "備註", "說明"],
      url: ["url", "link", "連結", "網址"],
      map: ["map", "maps", "google maps", "地圖", "地圖搜尋"]
    };

    const state = {
      rows: [],
      headers: [],
      activeTab: "timeline",
      filters: { q: "", day: "", city: "", view: "all" },
      done: JSON.parse(localStorage.getItem("travel.done") || "{}"),
      fav: JSON.parse(localStorage.getItem("travel.fav") || "{}")
    };

    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => [...root.querySelectorAll(selector)];

    function init() {
      loadRows(JSON.parse(localStorage.getItem("travel.rows") || "null") || sampleRows);
      bindEvents();
    }

    function bindEvents() {
      $("#searchInput").addEventListener("input", event => { state.filters.q = event.target.value.trim().toLowerCase(); render(); });
      $("#dayFilter").addEventListener("change", event => { state.filters.day = event.target.value; render(); });
      $("#cityFilter").addEventListener("change", event => { state.filters.city = event.target.value; render(); });
      $("#viewFilter").addEventListener("change", event => { state.filters.view = event.target.value; render(); });
      $("#sampleBtn").addEventListener("click", () => { loadRows(sampleRows); localStorage.setItem("travel.rows", JSON.stringify(sampleRows)); toast("已載入範例資料"); });
      $("#exportIcsBtn").addEventListener("click", exportIcs);
      $("#printBtn").addEventListener("click", () => window.print());
      $("#themeBtn").addEventListener("click", toggleTheme);
      $("#copyPlanBtn").addEventListener("click", () => copyRows(filteredRows()));
      $("#downloadCsvBtn").addEventListener("click", downloadCsv);
      $("#clearStateBtn").addEventListener("click", clearMarks);
      $("#csvFileInput").addEventListener("change", importCsv);
      $$(".tab").forEach(button => button.addEventListener("click", () => {
        state.activeTab = button.dataset.tab;
        $$(".tab").forEach(tab => tab.classList.toggle("active", tab === button));
        render();
      }));
    }

    function loadRows(rows) {
      state.headers = Object.keys(rows[0] || {});
      state.rows = rows.map((row, index) => ({ ...row, _id: makeId(row, index) }));
      populateFilters();
      render();
    }

    function populateFilters() {
      const days = unique(state.rows.map(row => getVal(row, "date")).filter(Boolean)).sort(compareDate);
      const cities = unique(state.rows.map(row => getVal(row, "city")).filter(Boolean)).sort();
      $("#dayFilter").innerHTML = `<option value="">全部日期</option>${days.map(day => `<option value="${esc(day)}">${esc(formatDate(day))}</option>`).join("")}`;
      $("#cityFilter").innerHTML = `<option value="">全部城市</option>${cities.map(city => `<option value="${esc(city)}">${esc(city)}</option>`).join("")}`;
    }

    function getVal(row, key) {
      const header = state.headers.find(candidate => aliases[key].some(alias => candidate.toLowerCase().trim() === alias.toLowerCase()));
      return String(row[key] || row[header] || "").trim();
    }

    function getTitle(row) { return getVal(row, "title") || getVal(row, "place") || "未命名行程"; }
    function getPlace(row) { return getVal(row, "place") || getVal(row, "address"); }
    function rowText(row) { return Object.values(row).join(" ").toLowerCase(); }

    function filteredRows() {
      return state.rows
        .filter(row => !state.filters.q || rowText(row).includes(state.filters.q))
        .filter(row => !state.filters.day || getVal(row, "date") === state.filters.day)
        .filter(row => !state.filters.city || getVal(row, "city") === state.filters.city)
        .filter(row => state.filters.view === "all" || (state.filters.view === "fav" && state.fav[row._id]) || (state.filters.view === "done" && state.done[row._id]) || (state.filters.view === "todo" && !state.done[row._id]))
        .sort((a, b) => compareDate(getVal(a, "date"), getVal(b, "date")) || compareTime(getVal(a, "start"), getVal(b, "start")));
    }

    function render() {
      renderStats();
      renderNext();
      if (state.activeTab === "timeline") renderTimeline();
      if (state.activeTab === "map") renderMap();
      if (state.activeTab === "checklist") renderChecklist();
      if (state.activeTab === "table") renderTable();
    }

    function renderStats() {
      const rows = filteredRows();
      const days = unique(rows.map(row => getVal(row, "date")).filter(Boolean)).length;
      const cities = unique(rows.map(row => getVal(row, "city")).filter(Boolean)).length;
      const done = rows.filter(row => state.done[row._id]).length;
      $("#stats").innerHTML = [
        [days || 0, "天數"],
        [rows.length, "行程"],
        [cities || 0, "城市"],
        [`${done}/${rows.length}`, "完成"]
      ].map(([num, label]) => `<div class="stat"><div class="num">${esc(num)}</div><div class="label">${esc(label)}</div></div>`).join("");
    }

    function renderNext() {
      const next = filteredRows().filter(row => !state.done[row._id]).slice(0, 4);
      $("#nextBox").innerHTML = next.length ? next.map(row => `<div class="compact-item"><b>${esc(getTitle(row))}</b><span>${esc([formatDate(getVal(row, "date")), getVal(row, "start"), getPlace(row)].filter(Boolean).join(" · "))}</span></div>`).join("") : `<div class="empty">目前沒有待辦行程</div>`;
    }

    function renderTimeline() {
      const rows = filteredRows();
      if (!rows.length) {
        $("#content").innerHTML = `<div class="empty">沒有符合條件的行程</div>`;
        return;
      }
      const groups = groupBy(rows, row => getVal(row, "date") || "未填日期");
      $("#content").innerHTML = Object.entries(groups).map(([day, items]) => `
        <section class="day-group">
          <div class="day-head">
            <div><div class="day-title">${esc(formatDate(day))}</div><div class="day-meta">${items.length} 個行程</div></div>
            <button class="btn" data-copy-day="${esc(day)}">複製當天</button>
          </div>
          <div class="cards">${items.map(cardHtml).join("")}</div>
        </section>
      `).join("");
      bindCardActions($("#content"));
      $$("[data-copy-day]").forEach(button => button.addEventListener("click", () => copyRows(groups[button.dataset.copyDay] || [])));
    }

    function cardHtml(row) {
      const badges = [getVal(row, "city"), getVal(row, "category"), getVal(row, "transport"), getVal(row, "cost")].filter(Boolean);
      const mapUrl = getMapUrl(row);
      const url = getUrl(row);
      return `
        <article class="card ${state.done[row._id] ? "done" : ""} ${state.fav[row._id] ? "fav" : ""}" data-id="${esc(row._id)}">
          <div class="card-top">
            <div>
              <div class="time">${esc([getVal(row, "start"), getVal(row, "end")].filter(Boolean).join("-") || "未填時間")}</div>
              <div class="title">${esc(getTitle(row))}</div>
              ${getPlace(row) ? `<div class="place">${esc(getPlace(row))}</div>` : ""}
            </div>
            <div>
              <button class="mini" data-fav="${esc(row._id)}">${state.fav[row._id] ? "已收藏" : "收藏"}</button>
              <button class="mini" data-done="${esc(row._id)}">${state.done[row._id] ? "完成" : "待辦"}</button>
            </div>
          </div>
          ${badges.length ? `<div class="badges">${badges.map(badge => `<span class="badge">${esc(badge)}</span>`).join("")}</div>` : ""}
          ${getVal(row, "note") ? `<div class="note">${linkify(getVal(row, "note"))}</div>` : ""}
          <div class="card-actions">
            ${mapUrl ? `<a class="mini" target="_blank" rel="noreferrer" href="${esc(mapUrl)}">開啟地圖</a>` : ""}
            ${url && url !== mapUrl ? `<a class="mini" target="_blank" rel="noreferrer" href="${esc(url)}">開啟連結</a>` : ""}
            <button class="mini" data-copy-row="${esc(row._id)}">複製</button>
          </div>
        </article>
      `;
    }

    function bindCardActions(root) {
      $$("[data-done]", root).forEach(button => button.addEventListener("click", () => {
        state.done[button.dataset.done] = !state.done[button.dataset.done];
        if (!state.done[button.dataset.done]) delete state.done[button.dataset.done];
        persistMarks();
      }));
      $$("[data-fav]", root).forEach(button => button.addEventListener("click", () => {
        state.fav[button.dataset.fav] = !state.fav[button.dataset.fav];
        if (!state.fav[button.dataset.fav]) delete state.fav[button.dataset.fav];
        persistMarks();
      }));
      $$("[data-copy-row]", root).forEach(button => button.addEventListener("click", () => {
        const row = state.rows.find(item => item._id === button.dataset.copyRow);
        if (row) copyRows([row]);
      }));
    }

    function persistMarks() {
      localStorage.setItem("travel.done", JSON.stringify(state.done));
      localStorage.setItem("travel.fav", JSON.stringify(state.fav));
      render();
    }

    function renderMap() {
      const rows = filteredRows().filter(getMapUrl);
      const allMapUrl = buildMultiStopMapUrl(rows.slice(0, 10));
      $("#content").innerHTML = `
        <div class="mapbox">
          <div>
            <b>地圖路線</b><br>
            使用 Google Maps 開啟目前篩選後的地點。
            ${allMapUrl ? `<br><br><a class="btn primary" target="_blank" rel="noreferrer" href="${esc(allMapUrl)}">開啟前 10 個地點</a>` : ""}
          </div>
        </div>
        <div class="route-list">
          ${rows.map((row, index) => `<div class="route-line"><div class="route-dot">${index + 1}</div><div><b>${esc(getTitle(row))}</b><div class="muted">${esc([formatDate(getVal(row, "date")), getVal(row, "start"), getPlace(row)].filter(Boolean).join(" · "))}</div><a target="_blank" rel="noreferrer" href="${esc(getMapUrl(row))}">開啟地圖</a></div></div>`).join("") || `<div class="empty">目前沒有可用地點</div>`}
        </div>
      `;
    }

    function renderChecklist() {
      const rows = filteredRows();
      $("#content").innerHTML = `<div class="cards">${rows.map(row => `
        <label class="card ${state.done[row._id] ? "done" : ""}" style="display:flex;gap:12px;align-items:flex-start;cursor:pointer">
          <input type="checkbox" data-check="${esc(row._id)}" ${state.done[row._id] ? "checked" : ""} style="margin-top:4px;width:18px;height:18px">
          <div><div class="title">${esc(getTitle(row))}</div><div class="place">${esc([formatDate(getVal(row, "date")), getVal(row, "start"), getPlace(row)].filter(Boolean).join(" · "))}</div></div>
        </label>`).join("") || `<div class="empty">沒有清單項目</div>`}</div>`;
      $$("[data-check]").forEach(input => input.addEventListener("change", () => {
        state.done[input.dataset.check] = input.checked;
        if (!input.checked) delete state.done[input.dataset.check];
        persistMarks();
      }));
    }

    function renderTable() {
      const rows = filteredRows();
      const headers = state.headers.filter(header => header !== "_id");
      $("#content").innerHTML = rows.length ? `<div style="overflow:auto;border:1px solid var(--line);border-radius:8px"><table><thead><tr>${headers.map(header => `<th>${esc(header)}</th>`).join("")}</tr></thead><tbody>${rows.map(row => `<tr>${headers.map(header => `<td>${linkify(row[header] || "")}</td>`).join("")}</tr>`).join("")}</tbody></table></div>` : `<div class="empty">沒有表格資料</div>`;
    }

    function importCsv(event) {
      const file = event.target.files[0];
      if (!file) return;
      file.text().then(text => {
        const rows = parseCsv(text);
        if (!rows.length) return toast("CSV 沒有資料");
        localStorage.setItem("travel.rows", JSON.stringify(rows));
        loadRows(rows);
        toast("已匯入 CSV");
      });
    }

    function parseCsv(text) {
      const rows = [];
      let cell = "", row = [], insideQuote = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i], next = text[i + 1];
        if (char === `"` && insideQuote && next === `"`) { cell += `"`; i++; }
        else if (char === `"`) insideQuote = !insideQuote;
        else if (char === "," && !insideQuote) { row.push(cell); cell = ""; }
        else if ((char === "\n" || char === "\r") && !insideQuote) {
          if (char === "\r" && next === "\n") i++;
          row.push(cell); rows.push(row); row = []; cell = "";
        } else cell += char;
      }
      row.push(cell);
      if (row.some(Boolean)) rows.push(row);
      const headers = rows.shift().map(header => header.trim());
      return rows.filter(item => item.some(Boolean)).map(item => Object.fromEntries(headers.map((header, index) => [header || `欄位${index + 1}`, item[index] || ""])));
    }

    function copyRows(rows) {
      const text = rows.map(row => `${formatDate(getVal(row, "date"))} ${getVal(row, "start")} ${getTitle(row)}${getPlace(row) ? ` @ ${getPlace(row)}` : ""}${getVal(row, "note") ? `\n備註：${getVal(row, "note")}` : ""}`).join("\n\n");
      navigator.clipboard.writeText(text).then(() => toast("已複製")).catch(() => window.prompt("請手動複製", text));
    }

    function downloadCsv() {
      const rows = filteredRows();
      const headers = state.headers.filter(header => header !== "_id");
      const csv = [headers.join(","), ...rows.map(row => headers.map(header => csvEscape(row[header] || "")).join(","))].join("\n");
      downloadBlob(csv, "travel-itinerary.csv", "text/csv;charset=utf-8");
    }

    function exportIcs() {
      const lines = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Travel App//Itinerary//ZH-TW", "CALSCALE:GREGORIAN"];
      filteredRows().forEach(row => {
        const start = makeIcsDate(getVal(row, "date"), getVal(row, "start"));
        if (!start) return;
        const end = makeIcsDate(getVal(row, "date"), getVal(row, "end")) || addOneHour(start);
        lines.push("BEGIN:VEVENT", `UID:${row._id}@travel-app`, `DTSTAMP:${utcStamp()}`, `DTSTART:${start}`, `DTEND:${end}`, `SUMMARY:${icsEscape(getTitle(row))}`);
        if (getPlace(row)) lines.push(`LOCATION:${icsEscape(getPlace(row))}`);
        if (getVal(row, "note")) lines.push(`DESCRIPTION:${icsEscape(getVal(row, "note"))}`);
        lines.push("END:VEVENT");
      });
      lines.push("END:VCALENDAR");
      downloadBlob(lines.join("\r\n"), "travel-itinerary.ics", "text/calendar;charset=utf-8");
    }

    function clearMarks() {
      state.done = {};
      state.fav = {};
      localStorage.removeItem("travel.done");
      localStorage.removeItem("travel.fav");
      render();
      toast("已清除狀態");
    }

    function toggleTheme() {
      const dark = document.documentElement.dataset.theme !== "dark";
      document.documentElement.dataset.theme = dark ? "dark" : "";
      localStorage.setItem("travel.theme", dark ? "dark" : "");
    }

    function getUrl(row) {
      const url = getVal(row, "url");
      return /^https?:\/\//i.test(url) ? url : "";
    }

    function getMapUrl(row) {
      const direct = [getVal(row, "map"), getUrl(row)].find(value => /^(https?:\/\/)?(www\.)?(google\.[^/]+\/maps|maps\.app\.goo\.gl|goo\.gl\/maps)/i.test(value));
      if (direct) return /^https?:\/\//i.test(direct) ? direct : `https://${direct}`;
      const query = getVal(row, "map") || getPlace(row) || getTitle(row);
      return query ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}` : "";
    }

    function buildMultiStopMapUrl(rows) {
      const points = rows.map(row => getVal(row, "map") || getPlace(row) || getTitle(row)).filter(Boolean);
      if (!points.length) return "";
      if (points.length === 1) return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(points[0])}`;
      return `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(points[0])}&destination=${encodeURIComponent(points.at(-1))}&waypoints=${encodeURIComponent(points.slice(1, -1).join("|"))}`;
    }

    function makeIcsDate(date, time) {
      const d = parseDate(date);
      if (!d) return "";
      const minutes = timeVal(time);
      const hh = minutes === 9999 ? 9 : Math.floor(minutes / 60);
      const mm = minutes === 9999 ? 0 : minutes % 60;
      return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}T${pad(hh)}${pad(mm)}00`;
    }

    function addOneHour(value) {
      const d = new Date(+value.slice(0, 4), +value.slice(4, 6) - 1, +value.slice(6, 8), +value.slice(9, 11) + 1, +value.slice(11, 13));
      return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
    }

    function parseDate(value) {
      const match = String(value || "").match(/(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/);
      if (match) return new Date(+match[1], +match[2] - 1, +match[3]);
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function compareDate(a, b) { return (parseDate(a)?.getTime() || 9e15) - (parseDate(b)?.getTime() || 9e15); }
    function compareTime(a, b) { return timeVal(a) - timeVal(b); }
    function timeVal(value) {
      const match = String(value || "").match(/(\d{1,2}):(\d{2})/);
      return match ? +match[1] * 60 + +match[2] : 9999;
    }

    function formatDate(value) {
      const d = parseDate(value);
      return d ? d.toLocaleDateString("zh-TW", { year: "numeric", month: "2-digit", day: "2-digit", weekday: "short" }) : value;
    }

    function linkify(value) {
      const text = String(value || "");
      return esc(text).replace(/(https?:\/\/[^\s<]+)/g, `<a target="_blank" rel="noreferrer" href="$1">$1</a>`);
    }

    function toast(message) {
      $("#toast").textContent = message;
      $("#toast").classList.add("show");
      setTimeout(() => $("#toast").classList.remove("show"), 1800);
    }

    function unique(values) { return [...new Set(values)]; }
    function groupBy(values, fn) { return values.reduce((group, item) => ((group[fn(item)] ||= []).push(item), group), {}); }
    function makeId(row, index) { return btoa(unescape(encodeURIComponent(JSON.stringify(row) + index))).replace(/=+/g, "").slice(0, 24); }
    function pad(number) { return String(number).padStart(2, "0"); }
    function utcStamp() { return new Date().toISOString().replace(/[-:]/g, "").replace(/\.\d{3}/, ""); }
    function csvEscape(value) { const text = String(value).replace(/"/g, `""`); return /[",\n]/.test(text) ? `"${text}"` : text; }
    function icsEscape(value) { return String(value || "").replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n"); }
    function esc(value) { return String(value ?? "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char])); }
    function downloadBlob(content, filename, type) {
      const blob = new Blob([content], { type });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      setTimeout(() => URL.revokeObjectURL(link.href), 1000);
    }

    document.documentElement.dataset.theme = localStorage.getItem("travel.theme") || "";
    init();
  </script>
</body>
</html>
